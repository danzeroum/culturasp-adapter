# Full local stack: API + scraper + Postgres + Redis.
# Usage:  cp .env.example .env  &&  docker compose up --build
services:
  api:
    build: .
    command: uvicorn culturasp.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Hardening: no privilege escalation, drop all Linux capabilities, and run
    # with a read-only root filesystem (the API only reads from the DB).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  scraper:
    build: .
    # Runs the periodic collection scheduler (not the one-shot CLI).
    command: python -m culturasp.scraper.scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Same hardening, minus read_only: Playwright/Chromium needs a writable FS.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-culturasp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-culturasp}
      POSTGRES_DB: ${POSTGRES_DB:-culturasp}
    ports:
      # Loopback-only: reachable from the host (psql/backups) but never from the
      # public internet. Inter-service access uses the compose network.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U culturasp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Loopback-only (see postgres note above).
      - "127.0.0.1:6379:6379"

  # Static SPA served by nginx, which also reverse-proxies the API so the
  # browser stays same-origin (no CORS, no API host baked into the bundle).
  # Browse at http://<host>:8080.
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
