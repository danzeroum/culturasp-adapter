server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, so the `api` service name is re-resolved at runtime
    # (survives api container restarts instead of caching a stale IP).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Reverse-proxy the read-only API so the SPA stays same-origin (no CORS, no
    # API host in the bundle). Covers the JSON API, feeds, docs and OpenAPI.
    location ~ ^/(v1|health|metrics|docs|openapi\.json|redoc) {
        set $upstream http://api:8000;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets; fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
