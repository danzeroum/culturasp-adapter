site_name: CulturaSP-Adapter
site_description: Open, read-only adapter for São Paulo's public cultural data.
repo_url: https://github.com/danzeroum/culturasp-adapter
theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Início: index.md
  - Arquitetura: architecture.md
  - Modelo de dados: data_model.md
  - API: api.md
  - Referência OpenAPI: api_reference.md
  - Scraping ético: ethics.md
  - Deploy: deployment.md
  - Compliance & segurança: compliance.md
  - Backup & DR: backup_dr.md
  - ADRs:
      - ADR-0001 Stack & deploy: adr/0001-stack-e-deploy.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
