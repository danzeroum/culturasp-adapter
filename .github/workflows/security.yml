name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 06:00 UTC) to catch newly disclosed CVEs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Audit dependencies for known CVEs (pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # --skip-editable: the local project itself isn't on PyPI; audit its deps.
          pip-audit --desc --skip-editable

  filesystem-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  image-scan:
    runs-on: ubuntu-latest
    needs: filesystem-scan
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t culturasp-adapter:${{ github.sha }} .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: culturasp-adapter:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Report only (base image CVEs shouldn't block PRs); secret/dep jobs gate.
          exit-code: "0"
