name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 06:00 UTC) to catch newly disclosed CVEs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Audit dependencies for known CVEs (pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # --skip-editable: the local project itself isn't on PyPI; audit its deps.
          pip-audit --desc --skip-editable

  filesystem-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Trivy filesystem scan (gating)
        run: trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 .

  image-scan:
    runs-on: ubuntu-latest
    needs: filesystem-scan
    # Report-only: base-image CVEs we can't fix shouldn't block merges, and the
    # heavy Playwright build shouldn't make the gate flaky. The fs/secret/dep
    # jobs are the real gates.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t culturasp-adapter:${{ github.sha }} .
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Trivy image scan (report only)
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 culturasp-adapter:${{ github.sha }}
